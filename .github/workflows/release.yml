name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: macos-latest
    environment: production
    permissions:
      contents: write
      pull-requests: write
    env:
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      RCLONE_REMOTE: gdrive
      UPDATE_MANIFEST_ID: ${{ secrets.UPDATE_MANIFEST_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Python setuptools (needed by node-gyp)
        run: pip3 install --break-system-packages setuptools

      - name: Install dependencies
        run: npm ci

      - name: Install rclone
        run: brew install rclone

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [gdrive]
          type = drive
          token = ${{ secrets.RCLONE_DRIVE_TOKEN }}
          EOF

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run release
        run: bash scripts/release.sh ${{ inputs.bump }}
